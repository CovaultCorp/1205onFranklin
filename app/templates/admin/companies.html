{% extends "base.html" %}
{% block content %}
<section class="panel">
  <h1>Companies</h1>
  <form method="post" class="grid-form">
    <label>Name <input name="name" required></label>
    <label>Legal name <input name="legal_name"></label>
    <label>Primary contact email <input name="primary_contact_email" type="email"></label>
    <button type="submit">Add company</button>
  </form>
  <table><tr><th>Name</th><th>Status</th><th>Contact</th><th>Update</th></tr>
  {% for company in companies %}
    <tr><form method="post" action="/admin/companies/{{ company.id }}/update"><td><input name="name" value="{{ company.name }}"></td><td><input name="status" value="{{ company.status }}"></td><td>{{ company.primary_contact_email or "" }}</td><td><button type="submit">Save</button></td></form></tr>
  {% endfor %}
  </table>
</section>
{% endblock %}
