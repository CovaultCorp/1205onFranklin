<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Building Access Registry" }}</title>
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.theme = stored || (systemDark ? "dark" : "light");
    })();
  </script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="app-header">
    <a class="brand" href="/">Building Access Registry</a>
    <nav class="app-nav">
      <a href="/request">Request</a>
      <a href="/admin">Admin</a>
      <a href="/admin/reports">Reports</a>
      <button class="btn btn-secondary theme-toggle" type="button" id="theme-toggle">Toggle theme</button>
      <form action="/logout" method="post"><button class="btn btn-secondary" type="submit">Logout</button></form>
    </nav>
  </header>
  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>
  <script>
    document.getElementById("theme-toggle")?.addEventListener("click", function () {
      var next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = next;
      localStorage.setItem("theme", next);
    });
  </script>
</body>
</html>
